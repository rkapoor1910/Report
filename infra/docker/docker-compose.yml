version: '3.9'

services:
  # ── Databases ──────────────────────────────────────────────────────────────
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: reportiq_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reportiq
      POSTGRES_PASSWORD: password
      POSTGRES_DB: reportiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reportiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reportiq_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Node/Fastify) ─────────────────────────────────────────────────────
  api:
    build:
      context: ../../apps/api
      dockerfile: Dockerfile.dev
    container_name: reportiq_api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://reportiq:password@postgres:5432/reportiq
      REDIS_URL: redis://redis:6379
    env_file:
      - ../../.env
    volumes:
      - ../../apps/api/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Python workers ─────────────────────────────────────────────────────────
  workers:
    build:
      context: ../../apps/workers
      dockerfile: Dockerfile.dev
    container_name: reportiq_workers
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://reportiq:password@postgres:5432/reportiq
      REDIS_URL: redis://redis:6379
    env_file:
      - ../../.env
    volumes:
      - ../../apps/workers/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Web (Next.js) ──────────────────────────────────────────────────────────
  web:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile.dev
    container_name: reportiq_web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001
    env_file:
      - ../../.env
    volumes:
      - ../../apps/web/src:/app/src
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
